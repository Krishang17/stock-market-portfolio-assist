name: Morning Briefing

on:
  schedule:
    # 10:15 UTC = 15:45 IST — just after the 15:30 IST close (the official
    # closing price publishes ~15:40), so the brief reflects the full trading
    # day and can suggest what to buy tomorrow. It's the brief for the next
    # morning. Mon–Fri only: markets are closed on weekends, so weekend runs
    # would just waste credits.
    # NOTE: GitHub's cron is best-effort and can be delayed (sometimes by many
    # minutes) under load — it is not a guaranteed-on-time scheduler.
    # NOTE: scheduled workflows are automatically PAUSED after ~60 days of no
    # repository activity; push a commit or re-enable the workflow to resume.
    - cron: "15 10 * * 1-5"
  # Manual trigger. Leave "action" as "none" to just refresh the dashboard, or
  # set it to add/remove a holding via the form fields below.
  workflow_dispatch:
    inputs:
      action:
        description: "Portfolio change ('none' = just refresh the dashboard)"
        type: choice
        options: [none, add, remove]
        default: none
      symbol:
        description: "Ticker, e.g. INFY (required for add/remove)"
        type: string
        default: ""
      name:
        description: "Company name (optional, for add)"
        type: string
        default: ""
      exchange:
        description: "Exchange"
        type: choice
        options: [NS, BO]
        default: NS
      qty:
        description: "Quantity / shares (for add)"
        type: string
        default: "0"
      buyPrice:
        description: "Average buy price in rupees (for add)"
        type: string
        default: "0"

# Needed so the job can commit the updated history + dashboard snapshot back.
permissions:
  contents: write

# Avoid overlapping runs racing on the history commit.
concurrency:
  group: morning-briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Node 22: yahoo-finance2 v3 requires Node >= 22.
      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Optional: apply an add/remove from the "Run workflow" form before analysis.
      - name: Update portfolio (from form)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.action != 'none' }}
        env:
          ACTION: ${{ inputs.action }}
          SYMBOL: ${{ inputs.symbol }}
          NAME: ${{ inputs.name }}
          EXCHANGE: ${{ inputs.exchange }}
          QTY: ${{ inputs.qty }}
          BUYPRICE: ${{ inputs.buyPrice }}
        run: npm run portfolio

      - name: Run morning briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional repo variable; falls back to the in-code default.
          MODEL: ${{ vars.MODEL || 'claude-sonnet-4-6' }}
        run: npm run briefing

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add portfolio.json data/history.json data/value-history.json docs/briefing.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update briefing data [skip ci]"
            git push
          fi
